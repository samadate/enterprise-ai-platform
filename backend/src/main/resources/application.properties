spring.application.name=enterprise-ai-platform

##################################################
# AI Configuration
##################################################
# Active AI Provider
ai.provider=ollama

##################################################
# Chat Model
##################################################
ai.chat.model=qwen2.5:0.5b

##################################################
# Embedding Model
##################################################
ai.embedding.model=all-minilm

##################################################
# Ollama Configuration
##################################################
ai.ollama.base-url=http://localhost:11434

##########################################################
# Logging
##########################################################
logging.level.root=INFO
logging.level.com.sam.enterpriseai=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n